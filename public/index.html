<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#111315" />
    <title>마피아</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="join-screen" id="joinPanel">
        <div class="brand-block">
          <p class="eyebrow">Mafia</p>
          <h1>마피아</h1>
          <p class="sub">폰, 패드, PC에서 방 코드로 접속해 바로 플레이하세요.</p>
        </div>
        <div class="join-card">
          <label>
            닉네임
            <input id="nameInput" maxlength="16" placeholder="예: 2반 민준" autocomplete="nickname" />
          </label>
          <button id="createBtn" class="primary">방 만들기</button>
          <div class="join-code">
            <input id="codeInput" maxlength="4" placeholder="방 코드" autocomplete="off" inputmode="latin" />
            <button id="joinBtn">입장</button>
          </div>
          <p class="hint" id="serverHint"></p>
        </div>
      </section>

      <section class="game hidden" id="gamePanel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Room</p>
            <h2 id="roomCode">----</h2>
          </div>
          <div class="status-stack">
            <span class="phase" id="phaseText">대기실</span>
            <span id="winnerText" class="winner hidden"></span>
          </div>
          <div class="top-actions">
            <button id="copyInviteBtn" class="ghost">초대 링크</button>
            <button id="shareInviteBtn" class="ghost">공유</button>
            <button id="resetBtn" class="ghost hidden">초기화</button>
            <button id="leaveBtn" class="ghost danger">방 나가기</button>
          </div>
        </header>

        <section class="identity">
          <div>
            <span>내 역할</span>
            <strong id="roleText">미정</strong>
            <p id="roleDescription">게임이 시작되면 역할이 배정됩니다.</p>
          </div>
          <div>
            <span>내 상태</span>
            <strong id="aliveText">대기 중</strong>
            <p id="actionHelp">방 설정을 확인하고 참가자를 기다리세요.</p>
          </div>
        </section>

        <section class="lobby-settings panel" id="settingsPanel">
          <div class="panel-head">
            <div>
              <h3>방 설정</h3>
              <p class="hint">기본은 시민 + 마피아입니다. 특수직은 원하는 만큼 켜세요.</p>
            </div>
            <button id="startBtn" class="primary hidden">게임 시작</button>
          </div>
          <div class="settings-grid">
            <label class="setting-item">
              <span>마피아 수</span>
              <input id="mafiaCount" type="number" min="1" max="8" value="1" />
            </label>
            <label class="setting-item">
              <span>경찰</span>
              <input id="detectiveCount" type="number" min="0" max="4" value="0" />
            </label>
            <label class="setting-item">
              <span>의사</span>
              <input id="doctorCount" type="number" min="0" max="4" value="0" />
            </label>
            <label class="setting-item">
              <span>영매사</span>
              <input id="mediumCount" type="number" min="0" max="4" value="0" />
            </label>
            <label class="setting-item">
              <span>조커</span>
              <input id="jokerCount" type="number" min="0" max="2" value="0" />
            </label>
            <label class="switch-row">
              <input id="revealOnDeath" type="checkbox" checked />
              <span>죽은 사람 역할 공개</span>
            </label>
            <label class="switch-row">
              <input id="allowDeadChat" type="checkbox" />
              <span>탈락자 일반 채팅 허용</span>
            </label>
            <label class="switch-row">
              <input id="autoAdvance" type="checkbox" checked />
              <span>모두 선택하면 자동 진행</span>
            </label>
          </div>
        </section>

        <section class="board">
          <div class="panel players">
            <div class="panel-head">
              <h3>참가자</h3>
              <span id="playerCount" class="chip">0명</span>
            </div>
            <div id="playersList" class="players-list"></div>
          </div>

          <div class="panel action">
            <div class="panel-head">
              <h3>대상 선택</h3>
              <span id="actionMode" class="chip">대기</span>
            </div>
            <div class="vote-progress">
              <span id="progressLabel">대기</span>
              <strong id="progressCount">0/0</strong>
            </div>
            <div id="targetList" class="target-list"></div>
          </div>

          <div class="panel feed">
            <div class="tabs">
              <button class="tab active" data-tab="chat">채팅</button>
              <button class="tab" data-tab="dead">탈락자</button>
              <button class="tab" data-tab="log">기록</button>
              <button class="tab" data-tab="notice">개인</button>
            </div>
            <div id="chatView" class="scroll-view"></div>
            <div id="deadView" class="scroll-view hidden"></div>
            <div id="logView" class="scroll-view hidden"></div>
            <div id="noticeView" class="scroll-view hidden"></div>
            <form id="chatForm" class="chat-form">
              <input id="chatInput" maxlength="240" placeholder="메시지" autocomplete="off" />
              <button>전송</button>
            </form>
          </div>
        </section>
      </section>
    </main>
    <div id="toast" class="toast hidden"></div>
    <script src="/app.js"></script>
  </body>
</html>
